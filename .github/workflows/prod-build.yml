name: Build UI Artifact

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to build'
        required: true
        type: string
      tag_name:
        description: 'GitHub release tag'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true
        type: string
      tag_name:
        description: 'GitHub release tag'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build & Upload
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bundle latest Hyperweaver docs into dist/docs
        # Pulls the newest hyperweaver-docs release (version-less asset), so the UI
        # artifact always ships current docs at /docs with no version to bump here.
        run: |
          echo "Fetching latest Hyperweaver docs artifact"
          mkdir -p dist/docs
          curl -fsSL "https://github.com/MarkProminic/hyperweaver-docs/releases/latest/download/hyperweaver-docs.tar.gz" | tar -xz -C dist/docs

      - name: Package and upload Hyperweaver UI artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tar -czf "hyperweaver-ui-${{ inputs.version }}.tar.gz" -C dist .
          gh release upload "${{ inputs.tag_name }}" "hyperweaver-ui-${{ inputs.version }}.tar.gz" --clobber
